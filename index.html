function SectionLabel({ children, className = '' }) {
  return (
    <div className={`flex items-center gap-3 mb-2 ${className}`}>

}

function MetricBar({ label, value, color }) {
  const [width, setWidth] = useState(0);
  const ref = useRef(null);

  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setWidth(value); obs.disconnect(); }
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [value]);

  return (
    <div ref={ref} className="mb-2">
      <div className="flex justify-between items-center mb-1">
        <span className="font-mono text-[10px] text-aluminum-300 tracking-wide">{label}</span>
        <span className="font-mono text-[10px] text-aluminum-300">{value}%</span>
      </div>
      <div className="track h-[3px] w-full">
        <div className={`bar-fill h-full ${color}`} style={{ width: `${width}%` }} />
      </div>
    </div>
  );
}

                  ))}

            </div>
          </div>
        </div>

                  i < PUBLICATIONS.length - 1 ? 'border-b border-aluminum-200/20' : ''

                  <p className="font-mono text-[10px] text-aluminum-300">{p.ref} — <em className="not-italic text-aluminum-300">{p.venue}</em></p>
                  <p className="font-mono text-[9px] text-aluminum-300 mt-0.5">{p.doi}</p>

              className="font-mono text-[10px] tracking-widest uppercase px-5 py-2.5 border border-accent-cyan/60 text-accent-cyan hover:bg-accent-cyan hover:text-slate-950 transition-all rounded-sm whitespace-nowrap"

          <SectionLabel>Contact &amp; Correspondence</SectionLabel>
          <div className="grid grid-cols-1 lg:grid-cols-[1fr_1fr] gap-10 mt-6">
            <div>
              <h2 className="font-sans text-3xl font-600 text-aluminum-100 mb-4">Engagement Enquiries</h2>

                Available for technical consultation on space systems, RF/antenna programs, AR/XR sensor architecture,
                and quantum technology roadmaps. Open to board advisory roles, keynote presentations, and research collaboration.

              <div className="space-y-4">

                  { label: 'Email',     value: 'bryan@bryanjustice.com.com', icon: '✉' },
                  { label: 'Location',  value: 'Seattle, WA Metro',             icon: '◎' },
                  { label: 'LinkedIn',  value: 'linkedin.com/in/bryanjustice1', icon: '↗' },
                ].map(c => (
                  <div key={c.label} className="flex items-center gap-4 border-b border-aluminum-200/20 pb-4 last:border-0">

                      {c.icon}

                      <p className="font-mono text-[9px] text-aluminum-300 tracking-widest">{c.label}</p>

            {/* Contact form */}
            <div className="border border-aluminum-200/25 rounded-sm card-aluminum p-6">
              <SectionLabel>Secure Message Form</SectionLabel>

              {formState === 'success' ? (
                <div className="mt-6 border border-accent-cyan/40 rounded-sm bg-accent-cyan/5 p-6 text-center">
                  <div className="text-accent-cyan text-2xl mb-3">✓</div>
                  <p className="font-mono text-[11px] text-accent-cyan tracking-widest uppercase mb-2">Transmission Received</p>
                  <p className="font-mono text-[10px] text-aluminum-300 leading-relaxed">
                    Message logged and routed successfully.<br/>Expect a response within 48 hours.
                  </p>
                  <button
                    onClick={() => setFormState('idle')}
                    className="mt-5 font-mono text-[9px] tracking-widest uppercase text-aluminum-300 hover:text-accent-cyan transition-colors"
                  >
                    Send another →
                  </button>
                </div>
              ) : (
                <div className="space-y-4 mt-4">
                  {[
                    { id: 'name',  label: 'Full Name *',    type: 'text',  placeholder: 'Jane Smith' },
                    { id: 'org',   label: 'Organization',   type: 'text',  placeholder: 'Company / Institution' },
                    { id: 'email', label: 'Email Address *', type: 'email', placeholder: 'j.smith@org.com' },
                  ].map(f => (
                    <div key={f.id}>
                      <label className="font-mono text-[9px] text-aluminum-300 tracking-widest uppercase block mb-1.5">
                        {f.label}
                      </label>
                      <input
                        type={f.type}
                        placeholder={f.placeholder}
                        value={formData[f.id]}
                        onChange={e => handleFieldChange(f.id, e.target.value)}
                        disabled={formState === 'sending'}
                        className="w-full bg-slate-950/60 border border-aluminum-200/30 rounded-sm px-3 py-2 font-mono text-[11px] text-aluminum-300 placeholder-aluminum-500 focus:outline-none focus:border-accent-cyan/50 focus:ring-1 focus:ring-accent-cyan/20 transition-all disabled:opacity-50"
                      />
                    </div>
                  ))}
                  <div>
                    <label className="font-mono text-[9px] text-aluminum-300 tracking-widest uppercase block mb-1.5">
                      Message *
                    </label>
                    <textarea
                      rows={4}
                      placeholder="Describe your enquiry, program scope, or collaboration interest..."
                      value={formData.message}
                      onChange={e => handleFieldChange('message', e.target.value)}
                      disabled={formState === 'sending'}
                      className="w-full bg-slate-950/60 border border-aluminum-200/30 rounded-sm px-3 py-2 font-mono text-[11px] text-aluminum-300 placeholder-aluminum-500 focus:outline-none focus:border-accent-cyan/50 focus:ring-1 focus:ring-accent-cyan/20 transition-all resize-none disabled:opacity-50"
                    />
                  </div>

                  {formError && (
                    <p className="font-mono text-[9px] text-red-400 tracking-wide leading-relaxed border border-red-400/30 bg-red-400/5 rounded-sm px-3 py-2">
                      ⚠ {formError}
                    </p>
                  )}

                  <button
                    onClick={handleSubmit}
                    disabled={formState === 'sending'}
                    className="w-full font-mono text-[10px] tracking-widest uppercase py-3 border border-accent-cyan text-accent-cyan hover:bg-accent-cyan hover:text-slate-950 transition-all rounded-sm mt-2 disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    {formState === 'sending' ? '— Transmitting —' : 'Transmit Enquiry'}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      </section>

      {/* ── Footer ───────────────────────────────────────── */}
      <footer className="border-t border-aluminum-200/20 py-8 px-6">
        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-5 h-5 border border-accent-cyan/40 rounded-sm flex items-center justify-center">
